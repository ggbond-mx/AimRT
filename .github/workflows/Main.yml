name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # 指定官方 runner
    runs-on: ubuntu-latest    # 可选择的官方 runner

    steps:
      - name: Run a test
        uses: actions/checkout@v3

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Use cmake
        run: cmake --version

      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: 11
          platform: x64

      - name: Use gcc
        run: gcc --version


      - name: Set up ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run:
          apt install libacl1-dev curl libssl-dev -y
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh

      - name: start build
        run:
          ./build.sh

